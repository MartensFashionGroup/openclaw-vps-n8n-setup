version: '3.8'

services:
  n8n:
    image: n8n:latest
    restart: always
    ports:
      - "5678:5678" # Main n8n interface
    volumes:
      - n8n_data:/home/node/.n8n
    environment:
      - N8N_HOST=${SUBDOMAIN}.${DOMAIN_NAME} # For custom domain, if using reverse proxy
      - N8N_PORT=5678
      - N8N_PROTOCOL=http # Will be https if reverse proxy handles SSL
      - WEBHOOK_URL=http://${SUBDOMAIN}.${DOMAIN_NAME}/ # Update if using HTTPS
      - NODE_ENV=production
      - N8N_EMAIL_MODE=smtp # Or other as needed
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USERNAME}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${POSTGRES_DB}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - n8n_network

  postgres:
    image: postgres:15
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - n8n_network

volumes:
  n8n_data:
  postgres_data:

networks:
  n8n_network:
    driver: bridge